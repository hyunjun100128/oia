<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oia Cat</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 💻 패드 & PC 기본 설정 (절대 안 겹치게 위에서부터 쌓음) */
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* 화면 위에서부터 차례대로 배치 */
            padding-top: 8dvh; /* 폰트를 위로 확 올림 */
            min-height: 100dvh; 
            background-color: #ffffff;
            overflow: hidden;
        }

        .info-link {
            text-decoration: none;
            color: #000000;
            cursor: pointer;
            z-index: 10;
            /* 겹침 방지를 위해 position: absolute 제거 */
        }

        .info-text {
            font-family: "Figtree", sans-serif;
            font-weight: 900;
            font-size: clamp(4rem, 15vw, 7rem); 
            letter-spacing: -0.05em;
            line-height: 1;
        }

        .cat-container {
            width: 85%;
            max-width: 650px; /* 고양이 크기 최대치로 키움 */
            max-height: 65dvh; /* 단, 화면 밖으로 넘치거나 폰트랑 겹치지 않게 방어막 설정 */
            aspect-ratio: 1 / 1;
            /* 남은 공간의 한가운데에 고양이를 배치 */
            margin-top: auto; 
            margin-bottom: auto;
        }

        .tenor-gif-embed a {
            display: none !important;
        }

        /* 📱 모바일 전용 (화면폭 768px 이하) - 맘에 들어했던 세팅 그대로 복구! */
        @media (max-width: 768px) {
            body {
                justify-content: center; /* 고양이 정중앙 고정 */
                padding-top: 0;
                position: relative;
            }
            .info-link {
                position: absolute; /* 글자만 따로 공중에 띄움 */
                top: 10dvh; 
            }
            .cat-container {
                width: 90%;
                max-width: none;
                margin-top: 0;
                margin-bottom: 0;
            }
        }
    </style>
</head>
<body>

    <a href="/info" class="info-link">
        <h1 class="info-text">info</h1>
    </a>

    <div class="cat-container">
        <div class="tenor-gif-embed" data-postid="12805916815008299407" data-share-method="host" data-aspect-ratio="1" data-width="100%">
            <a href="https://tenor.com/view/oia-uia-oia-cat-uia-cat-catcultclassics-gif-12805916815008299407">Oia Uia Sticker</a>from <a href="https://tenor.com/search/oia-stickers">Oia Stickers</a>
        </div> 
        <script type="text/javascript" async src="https://tenor.com/embed.js"></script>
    </div>

</body>
</html>
