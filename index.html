<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oia Cat</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@900&display=swap" rel="stylesheet">

    <style>
        /* 기본 여백 제거 및 화면 꽉 채우기 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* vh 대신 최신 dvh를 사용하여 모바일 브라우저 주소창 밀림 현상 방지 */
            min-height: 100dvh; 
            background-color: #ffffff;
            overflow: hidden; /* 스크롤바 생기는 것 방지 */
        }

        /* info 링크 스타일 */
        .info-link {
            text-decoration: none;
            color: #000000;
            margin-bottom: 20px;
            cursor: pointer;
        }

        /* info 폰트 스타일 */
        .info-text {
            font-family: "Figtree", sans-serif;
            font-weight: 900;
            font-size: clamp(3.5rem, 15vw, 6rem); 
            letter-spacing: -0.05em;
            line-height: 1;
        }

        /* 고양이 GIF 컨테이너 (패드/PC 기준) */
        .cat-container {
            width: 80%;
            max-width: 450px;
            aspect-ratio: 1 / 1;
        }

        /* Tenor 기본 텍스트 링크 숨기기 */
        .tenor-gif-embed a {
            display: none !important;
        }

        /* 📱 모바일 화면에서만 적용되는 마법의 코드 (화면 위로 끌어올리기) */
        @media (max-width: 768px) {
            body {
                /* 완벽한 중앙 정렬 대신, 시작점을 위에서 18% 위치로 끌어올림 */
                justify-content: flex-start;
                padding-top: 18vh; 
            }
            .info-link {
                margin-bottom: 5px; /* 글자와 고양이 사이 간격을 확 좁힘 */
            }
            .cat-container {
                width: 95%; /* 폰에서는 고양이가 꽉 차 보이게 확대 */
            }
        }
    </style>
</head>
<body>

    <a href="/info" class="info-link">
        <h1 class="info-text">info</h1>
    </a>

    <div class="cat-container">
        <div class="tenor-gif-embed" data-postid="12805916815008299407" data-share-method="host" data-aspect-ratio="1" data-width="100%">
            <a href="https://tenor.com/view/oia-uia-oia-cat-uia-cat-catcultclassics-gif-12805916815008299407">Oia Uia Sticker</a>from <a href="https://tenor.com/search/oia-stickers">Oia Stickers</a>
        </div> 
        <script type="text/javascript" async src="https://tenor.com/embed.js"></script>
    </div>

</body>
</html>
