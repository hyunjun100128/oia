<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oia Cat</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100dvh; 
            background-color: #ffffff;
            overflow: hidden;
            position: relative; 
        }

        /* info 글자 공통 설정 (기기 상관없이 화면 위쪽으로 고정) */
        .info-link {
            text-decoration: none;
            color: #000000;
            cursor: pointer;
            z-index: 10;
            position: absolute; 
            top: 10dvh; /* 화면 맨 위에서 10% 위치로 쫙 올림 */
        }

        .info-text {
            font-family: "Figtree", sans-serif;
            font-weight: 900;
            /* 폰트 크기도 전체적으로 살짝 더 큼직하게 조정 */
            font-size: clamp(4rem, 15vw, 7rem); 
            letter-spacing: -0.05em;
            line-height: 1;
        }

        /* 패드/PC용 고양이 크기 설정 (사이즈 확 키움) */
        .cat-container {
            width: 85%;
            max-width: 600px; /* 기존 450px에서 600px로 큼직하게 확대 */
            aspect-ratio: 1 / 1;
            /* 글자가 위로 갔으니 고양이는 살짝 아래로 내려서 중앙을 맞춤 */
            margin-top: 5dvh; 
        }

        .tenor-gif-embed a {
            display: none !important;
        }

        /* 📱 모바일 전용 (화면폭 768px 이하) */
        @media (max-width: 768px) {
            .info-link {
                top: 12dvh; /* 모바일에서는 위쪽 공간을 살짝 더 줌 (고양이랑 간격 확보) */
            }
            .cat-container {
                width: 90%; /* 모바일에서는 폰 화면에 꽉 차게 */
                max-width: 100%;
                margin-top: 0; /* 모바일에서는 완벽한 중앙에 위치 */
            }
        }
    </style>
</head>
<body>

    <a href="/info" class="info-link">
        <h1 class="info-text">info</h1>
    </a>

    <div class="cat-container">
        <div class="tenor-gif-embed" data-postid="12805916815008299407" data-share-method="host" data-aspect-ratio="1" data-width="100%">
            <a href="https://tenor.com/view/oia-uia-oia-cat-uia-cat-catcultclassics-gif-12805916815008299407">Oia Uia Sticker</a>from <a href="https://tenor.com/search/oia-stickers">Oia Stickers</a>
        </div> 
        <script type="text/javascript" async src="https://tenor.com/embed.js"></script>
    </div>

</body>
</html>
