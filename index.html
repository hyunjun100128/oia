<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oia Cat</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100dvh; 
            background-color: #ffffff;
            overflow: hidden;
            position: relative; /* 모바일에서 글자를 공중에 띄우기 위한 기준점 */
        }

        .info-link {
            text-decoration: none;
            color: #000000;
            margin-bottom: 20px;
            cursor: pointer;
            z-index: 10;
        }

        .info-text {
            font-family: "Figtree", sans-serif;
            font-weight: 900;
            font-size: clamp(3.5rem, 15vw, 6rem); 
            letter-spacing: -0.05em;
            line-height: 1;
        }

        .cat-container {
            width: 80%;
            max-width: 450px;
            aspect-ratio: 1 / 1;
        }

        .tenor-gif-embed a {
            display: none !important;
        }

        /* 📱 모바일 전용 (태블릿/PC는 영향 안 받음) */
        @media (max-width: 768px) {
            body {
                /* 고양이를 화면 정중앙에 완벽하게 고정 */
                justify-content: center; 
                padding-top: 0;
            }
            .info-link {
                /* 글자를 흐름에서 떼어내서 화면 상단 빈 공간의 딱 중간(1~3 중 2 위치)에 배치 */
                position: absolute; 
                top: 10dvh; /* 2dvh 제안처럼 훨씬 위쪽으로 끌어올림 */
                margin-bottom: 0;
            }
            .cat-container {
                width: 90%;
            }
        }
    </style>
</head>
<body>

    <a href="/info" class="info-link">
        <h1 class="info-text">info</h1>
    </a>

    <div class="cat-container">
        <div class="tenor-gif-embed" data-postid="12805916815008299407" data-share-method="host" data-aspect-ratio="1" data-width="100%">
