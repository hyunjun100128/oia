<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oia Cat</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            /* 고양이는 무조건 화면 정중앙에 위치 */
            justify-content: center; 
            min-height: 100dvh; 
            background-color: #ffffff;
            /* 스크롤바가 생기거나 화면이 잘리는 현상 완벽 차단 */
            overflow: hidden; 
            position: relative;
        }

        .info-link {
            text-decoration: none;
            color: #000000;
            /* 글자를 흐름에서 빼서 화면 위쪽에 딱 고정 */
            position: absolute; 
            top: 15dvh; 
            z-index: 10;
        }

        .info-text {
            font-family: "Figtree", sans-serif;
            font-weight: 900;
            /* 폰트 크기 줄임: 어떤 기기에서도 한눈에 쏙 들어오는 안전한 크기 */
            font-size: clamp(2.5rem, 6vmin, 4.5rem); 
            letter-spacing: -0.05em;
            line-height: 1;
        }

        .cat-container {
            /* 핵심 해결책: 화면 가로세로 중 '더 짧은 쪽'의 55% 크기만 차지함 */
            /* 이렇게 하면 화면이 아무리 길거나 넓어도 글자와 절대 안 겹침 */
            width: clamp(200px, 55vmin, 400px);
            aspect-ratio: 1 / 1;
        }

        .tenor-gif-embed a {
            display: none !important;
        }
    </style>
</head>
<body>

    <a href="/info" class="info-link">
        <h1 class="info-text">info</h1>
    </a>

    <div class="cat-container">
        <div class="tenor-gif-embed" data-postid="12805916815008299407" data-share-method="host" data-aspect-ratio="1" data-width="100%">
            <a href="https://tenor.com/view/oia-uia-oia-cat-uia-cat-catcultclassics-gif-12805916815008299407">Oia Uia Sticker</a>from <a href="https://tenor.com/search/oia-stickers">Oia Stickers</a>
        </div> 
        <script type="text/javascript" async src="https://tenor.com/embed.js"></script>
    </div>

</body>
</html>
