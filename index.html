<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oia Cat</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* 화면을 위, 중간(고양이), 아래 3구역으로 나눔 */
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100dvh;
            background-color: #ffffff;
            overflow: hidden;
        }

        /* 1. 상단 구역 & info 폰트 */
        .info-link {
            flex: 1; /* 위쪽 남는 공간을 싹 다 차지함 */
            display: flex;
            align-items: center; /* 그 공간의 완벽한 '정중앙'에 폰트를 띄움 (원하시던 딱 그 위치!) */
            justify-content: center;
            text-decoration: none;
            color: #000000;
            width: 100%;
            z-index: 10;
        }

        .info-text {
            font-family: "Figtree", sans-serif;
            font-weight: 900;
            font-size: clamp(3.5rem, 8vw, 5rem); 
            letter-spacing: -0.05em;
            line-height: 1;
        }

        /* 2. 고양이 구역 */
        .cat-container {
            flex: 0 0 auto;
            /* ⭐️ 핵심: 화면 가로에 꽉 차게(100vw) 하되, 화면 높이의 75%를 넘지 않게 제한 */
            /* = 절대 화면 밖으로 안 짤리면서 가질 수 있는 가장 큰 크기 */
            width: min(100vw, 75dvh); 
            aspect-ratio: 1 / 1;
        }

        /* 3. 하단 구역 (균형추 역할) */
        .bottom-space {
            flex: 1; /* 상단 공간과 똑같은 크기를 가져서 고양이를 화면 정중앙에 고정시킴 */
            width: 100%;
        }

        .tenor-gif-embed a {
            display: none !important;
        }
    </style>
</head>
<body>

    <a href="/info" class="info-link">
        <h1 class="info-text">info</h1>
    </a>

    <div class="cat-container">
        <div class="tenor-gif-embed" data-postid="12805916815008299407" data-share-method="host" data-aspect-ratio="1" data-width="100%">
            <a href="https://tenor.com/view/oia-uia-oia-cat-uia-cat-catcultclassics-gif-12805916815008299407">Oia Uia Sticker</a>from <a href="https://tenor.com/search/oia-stickers">Oia Stickers</a>
        </div> 
        <script type="text/javascript" async src="https://tenor.com/embed.js"></script>
    </div>

    <div class="bottom-space"></div>

</body>
</html>
