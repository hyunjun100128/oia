<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crèdit - oia.cat</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Outfit", sans-serif;
            font-weight: 900;
            background-color: #ffffff;
            color: #000000;
            padding: 50px 20px;
            line-height: 1.3; 
            overflow-x: hidden;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 15px; /* 글자 사이의 기본 위아래 간격 */
        }

        /* 가로로 나란히 배치하는 구역 (Crèdit En/Cat, Twitch TikTok) */
        .row-flex {
            display: flex;
            align-items: baseline; /* 글자 아래쪽 선을 맞춤 */
            gap: 20px; /* 단어 사이 가로 간격 */
            flex-wrap: wrap;
        }

        /* 가장 큰 기본 글자 (SNS 이름들) */
        .text-large {
            font-size: clamp(3rem, 12vw, 4.5rem);
            letter-spacing: -0.03em;
        }

        /* 중간 크기 글자 (En / Cat, Fet per @w4at) */
        .text-medium {
            font-size: clamp(2rem, 8vw, 3rem);
            letter-spacing: -0.03em;
        }

        /* 특정 요소 간격 조정 */
        .margin-bottom-large {
            margin-bottom: 30px; /* Fet per 아래에 여백을 더 줌 */
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="row-flex">
            <div class="text-large">Crèdit</div>
            <div class="text-medium">En / Cat</div>
        </div>

        <div class="text-medium margin-bottom-large">
            Fet per @w4at
        </div>

        <div class="text-large">Discord</div>
        <div class="text-large">Instagram</div>
        <div class="text-large">Reddit</div>
        
        <div class="row-flex">
            <div class="text-large">Twitch</div>
            <div class="text-large">TikTok</div>
        </div>

        <div class="text-large">YouTube</div>

    </div>

</body>
</html>
